name: Deploy AI Analysis Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Check secrets
        working-directory: .
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is missing."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Ensure workers.dev subdomain exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: b57a32fd3e7015c07fed6a6066d43bca
        run: |
          current=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/subdomain" \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('result') and d['result'].get('subdomain') or '')")
          if [ -n "$current" ]; then
            echo "Subdomain already registered: $current.workers.dev"
            exit 0
          fi
          for name in nouraskin nouraskinsecrets noura-skin-uppsala; do
            resp=$(curl -s -X PUT -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"subdomain\":\"$name\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/subdomain")
            ok=$(echo "$resp" | python3 -c "import sys,json;print(json.load(sys.stdin).get('success'))")
            if [ "$ok" = "True" ]; then
              echo "Registered subdomain: $name.workers.dev"
              exit 0
            fi
            echo "Could not register '$name': $resp"
          done
          echo "::error::Failed to register a workers.dev subdomain"
          exit 1

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Anthropic API key secret
        run: echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: End-to-end tests (small sv + large ar photo)
        working-directory: .
        run: |
          sleep 5
          run_test() {
            img=$(base64 -w0 "$1")
            echo "{\"image\":\"$img\",\"mediaType\":\"image/jpeg\",\"lang\":\"$2\"}" > /tmp/payload.json
            echo "--- test: $1 lang=$2 payload=$(wc -c < /tmp/payload.json) bytes ---"
            status=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 180 \
              -X POST "https://noura-hudanalys.nouraskin.workers.dev/analyze" \
              -H "Content-Type: application/json" \
              -H "Origin: https://nouraskinsecrets.se" \
              --data @/tmp/payload.json)
            echo "HTTP status: $status"
            head -c 3000 /tmp/resp.json; echo
            [ "$status" = "200" ] || { echo "::error::Analysis test failed ($1 $2)"; exit 1; }
          }
          run_test images/hero-poster.jpg sv
          run_test worker/test-assets/test-photo-large.jpg ar
